<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoClick — Iniciar Sesión de Administrador</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    body { background: var(--bg-primary); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .admin-card { background: var(--bg-secondary); padding: 2rem; border-radius: var(--radius-lg); width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
    .admin-card img { width: 280px; display: block; margin: 0 auto 1.5rem; filter: drop-shadow(0 0 10px rgba(0,230,91,0.2)); }
    .admin-card h2 { margin-top: 0; color: #ef4444; margin-bottom: 2rem; }
    .form-group-left { text-align: left; }
    .btn-admin { background: #ef4444; border-color: #ef4444; color: white; }
    .btn-return-wrapper { margin-top: 2rem; }
    .btn-return { text-decoration: none; padding: 6px 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="admin-card animate-fade-in-up text-center">
    <img src="../assets/logo_motoclick_blanco.png" alt="MotoClick Logo">
    <h2>Panel Administrativo</h2>
    <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
      <div class="form-group form-group-left">
        <label class="form-label" for="admin-pass">Contraseña Maestra</label>
        <input class="form-input" type="password" id="admin-pass" name="password" placeholder="Tu contraseña de administrador" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg btn-admin">Acceder al Panel</button>
      <div class="btn-return-wrapper">
        <a href="../" class="btn-sm btn-outline btn-return">← Regresar al Inicio</a>
      </div>
    </form>
  </div>
  
  <script src="../js/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    // Verificar sesión activa de admin
    (function() {
      const user = store.getCurrentUser();
      if (user && user.role === 'admin') {
        window.location.replace('/admin/panel.html');
      }
    })();

    async function handleAdminLogin(e) {
      e.preventDefault();
      const form = e.target;
      const pass = form.password.value;

      if (!pass || pass.length < 6) {
        showToast('Contraseña incorrecta.', 'error');
        return;
      }

      const btn = form.querySelector('[type="submit"]');
      btn.disabled = true; btn.textContent = 'Verificando...';

      // Intentar login con Supabase Auth (admin usa email + contraseña)
      if (store._auth) {
        // Admin se autentica con email real en Supabase Auth
        const adminEmail = 'admin@motoclick.app';
        const result = await store._auth._sb.auth.signInWithPassword({
          email: adminEmail,
          password: pass
        });

        btn.disabled = false; btn.textContent = 'Acceder al Panel';

        if (result.error) {
          showToast('Contraseña incorrecta, acceso denegado.', 'error');
          form.password.value = '';
          return;
        }

        if (result.data.user) {
          // Cargar perfil de admin
          const { data: profile } = await store._sb
            .from('users')
            .select('*')
            .eq('user_id', result.data.user.id)
            .maybeSingle();

          if (profile && profile.role === 'admin') {
            store.setCurrentUser(profile);
            showToast('¡Bienvenido, Administrador! 🛡️', 'success');
            setTimeout(() => window.location.replace('/admin/panel.html'), 600);
          } else {
            showToast('Esta cuenta no tiene permisos de administrador.', 'error');
            await store._auth.signOut();
            form.password.value = '';
          }
        }
      } else {
        // Fallback legacy — sin Auth
        showToast('Servicio de autenticación no disponible.', 'error');
        btn.disabled = false; btn.textContent = 'Acceder al Panel';
      }
    }

    async function logoutAdmin() {
      if (store && typeof store.logout === 'function') {
        await store.logout();
      }
      window.location.href = '../';
    }
  </script>
</body>
</html>

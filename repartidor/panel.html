<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MotoClick — Panel de solicitudes para repartidores.">
  <title>MotoClick — Panel Repartidor</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
      gap: var(--space-md);
    }
    .panel-header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .online-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--success-bg);
      border: 1px solid rgba(34, 197, 94, 0.25);
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--success);
    }
    .online-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    .orders-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
    .new-order-flash {
      animation: flashBorder 1s ease 3;
    }
    @keyframes flashBorder {
      0%, 100% { border-color: var(--border-color); }
      50% { border-color: var(--primary-500); box-shadow: var(--shadow-glow-strong); }
    }
    .user-greeting {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .user-name {
      color: var(--text-accent);
      font-weight: 600;
    }
    .active-delivery-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
      background: rgba(0, 230, 91, 0.08);
      border: 1px solid var(--border-active);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-lg);
      cursor: pointer;
      transition: all var(--duration-fast) ease;
    }
    .active-delivery-banner:hover {
      background: rgba(0, 230, 91, 0.14);
    }
    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--gradient-primary);
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .user-greeting { cursor: pointer; }
    .panel-container { max-width: 750px; }
    .banner-inner { display: flex; align-items: center; gap: var(--space-md); }
    .banner-icon { font-size: 1.3rem; }
    .banner-title { font-weight: 600; }
    .banner-text { font-size: 0.85rem; color: var(--text-secondary); }
    .panel-subtitle { font-size: 0.9rem; }

    /* Historial */
    .history-section {
      margin-top: var(--space-3xl);
      padding-bottom: var(--space-2xl);
    }
    .history-header {
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .history-header h3 { font-size: 1.2rem; font-weight: 700; }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .history-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    .history-item:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--border-active);
    }
    .history-main { display: flex; flex-direction: column; gap: 4px; }
    .history-info { font-size: 0.95rem; font-weight: 500; }
    .history-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    .history-price { font-weight: 700; color: #22c55e; font-size: 1.1rem; }
    .history-empty {
      padding: var(--space-xl);
      text-align: center;
      background: rgba(255, 255, 255, 0.01);
      border: 1px dashed var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999;
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-content {
      background: var(--bg-secondary); border-radius: var(--radius-md);
      padding: var(--space-xl); width: 90%; max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- Navbar -->
    <nav class="navbar">
      <a href="../" class="navbar-brand">
        <img src="../assets/logo.png" alt="MotoClick Logo" class="brand-logo">
      </a>
      <div class="navbar-actions">
        <span class="user-greeting" id="user-greeting" onclick="openProfileModal()" title="Editar Perfil"></span>
        <button class="btn btn-sm btn-secondary" onclick="handleLogout()">Salir</button>
      </div>
    </nav>

    <div class="page-content">
      <div class="container panel-container">
        <!-- Active delivery banner -->
        <div class="active-delivery-banner hidden" id="active-banner" onclick="goToActiveDelivery()">
          <div class="banner-inner">
            <span class="banner-icon">🏍️</span>
            <div>
              <div class="banner-title">Tienes una entrega activa</div>
              <div class="banner-text" id="active-banner-detail"></div>
            </div>
          </div>
          <span class="btn btn-sm btn-primary">Ver →</span>
        </div>

        <!-- Header -->
        <div class="panel-header">
          <div class="panel-header-left">
            <h2>📋 Mandados Disponibles <span class="count-badge" id="order-count">0</span></h2>
            <p class="text-secondary panel-subtitle">Acepta un mandado para comenzar</p>
          </div>
          <div class="online-badge">
            <span class="online-dot"></span>
            En línea
          </div>
        </div>

        <!-- Orders List -->
        <div class="orders-list" id="orders-list">
          <div class="empty-state" id="empty-state">
            <div class="empty-state-icon">📭</div>
            <div class="empty-state-title">Sin mandados por ahora</div>
            <div class="empty-state-text">Cuando un cliente solicite un mandado, aparecerá aquí automáticamente.</div>
          </div>
        </div>

        <!-- History -->
        <div class="history-section">
          <div class="history-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3 style="margin: 0;">📜 Tu Historial de Viajes</h3>
            <button class="btn btn-sm btn-outline" style="border-width:2px; font-weight:700;" onclick="openManualTripModal()">+ Agregar Viaje</button>
          </div>
          <div class="history-list" id="history-list">
            <!-- Cargando... -->
          </div>
        </div>
      </div>
    </div>
  </div>

    <!-- Add/Edit Trip Modal -->
    <div class="modal-overlay hidden" id="manual-trip-modal">
      <div class="modal-content animate-fade-in-up">
        <h3 id="manual-trip-title" style="margin-bottom: var(--space-xs);">Agregar Viaje Manual</h3>
        <p class="text-secondary mb-md" style="font-size: 0.9rem;">Registra un viaje que no entró por la app.</p>
        <form id="manual-trip-form" onsubmit="saveManualTrip(event)">
          <input type="hidden" id="mt-id" />
          <div class="form-group">
            <label class="form-label" for="mt-desc">Descripción / Cliente</label>
            <input class="form-input" type="text" id="mt-desc" required placeholder="Ej. Mandado a Doña Flor" />
          </div>
          <div class="form-group">
            <label class="form-label" for="mt-addr">Dirección de Entrega</label>
            <input class="form-input" type="text" id="mt-addr" required placeholder="Ej. Cruz de Ayala" />
          </div>
          <div class="form-group" style="display: flex; gap: var(--space-sm);">
            <div style="flex:1;">
              <label class="form-label" for="mt-price">Costo ($)</label>
              <input class="form-input" type="number" id="mt-price" required placeholder="40" min="0" />
            </div>
            <div style="flex:1;">
              <label class="form-label" for="mt-duration">Duración (Mins)</label>
              <input class="form-input" type="number" id="mt-duration" placeholder="15" min="0" />
            </div>
          </div>
          <div style="display: flex; gap: var(--space-md); margin-top: var(--space-lg);">
            <button type="button" class="btn btn-secondary btn-block" onclick="closeManualTripModal()">Cancelar</button>
            <button type="submit" class="btn btn-primary btn-block">Guardar</button>
          </div>
        </form>
      </div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    const user = requireAuth('driver');
    let previousCount = 0;

    if (user) {
      document.getElementById('user-greeting').innerHTML =
        `Hola, <span class="user-name" id="navbar-user-name">${user.name}</span>`;
      loadOrders();
      renderHistory();

      // Listen for new orders
      store.on('new_order', () => {
        playNotificationSound();
        showToast('🆕 ¡Nuevo mandado disponible!', 'warning');
        loadOrders(true);
      });

      // Poll as fallback
      setInterval(() => {
        loadOrders();
        renderHistory();
      }, 5000);
    }

    async function loadOrders(isNew = false) {
      const [pending, activeOrder] = await Promise.all([
        store.getPendingOrders(),
        store.getActiveOrderForDriver(user.id)
      ]);
      const container = document.getElementById('orders-list');
      const countBadge = document.getElementById('order-count');
      const banner    = document.getElementById('active-banner');

      if (activeOrder) {
        banner.classList.remove('hidden');
        document.getElementById('active-banner-detail').textContent =
          `${(activeOrder.description || '').substring(0, 50)}... — ${getStatusLabel(activeOrder.status)}`;
      } else {
        banner.classList.add('hidden');
      }

      countBadge.textContent = pending.length;

      if (pending.length > previousCount && previousCount > 0) playNotificationSound();
      previousCount = pending.length;

      if (pending.length === 0) {
        container.innerHTML = '';
        container.appendChild(createEmptyState());
        return;
      }

      container.innerHTML = pending.map((order, i) => `
        <div class="order-card ${isNew && i === pending.length - 1 ? 'new-order-flash' : ''}" id="order-${order.id}">
          <div class="order-card-header">
            <div style="display: flex; align-items: center; gap: var(--space-sm);">
              <span style="font-size: 1.2rem;">📦</span>
              <div>
                <div style="font-weight: 600;">${order.clientName}</div>
                <div style="font-size: 0.8rem; color: var(--text-muted);">${timeAgo(order.createdAt)}</div>
              </div>
            </div>
            <span class="badge ${getPaymentBadgeClass(order.paymentMethod)}">
              ${getPaymentLabel(order.paymentMethod)}
            </span>
          </div>
          <div class="order-card-body">
            <div class="order-detail">
              <span class="order-detail-icon">📝</span>
              <span class="order-detail-text">${order.description}</span>
            </div>
            <div class="order-detail">
              <span class="order-detail-icon">📍</span>
              <span class="order-detail-text"><strong>Recoger:</strong> ${order.pickupAddress}</span>
            </div>
            <div class="order-detail">
              <span class="order-detail-icon">🏠</span>
              <span class="order-detail-text"><strong>Entregar:</strong> ${order.deliveryAddress}</span>
            </div>
            ${order.stopDescription ? `
              <div class="order-detail" style="border-left: 2px solid #3b82f6; padding-left: 10px; margin-top: 8px;">
                <span class="order-detail-icon">📍</span>
                <span class="order-detail-text"><strong style="color: #3b82f6;">Parada:</strong> ${order.stopDescription}</span>
              </div>
            ` : ''}
          </div>
          <div class="order-card-footer">
            <button class="btn btn-primary btn-block" onclick="acceptOrder('${order.id}')">
              ✅ Aceptar Mandado
            </button>
          </div>
        </div>
      `).join('');
    }

    async function renderHistory() {
      const historyList = document.getElementById('history-list');
      if (!historyList) return;

      try {
        const allMyOrders = await store.getOrdersByDriver(user.id);
        const completed = allMyOrders.filter(o => o.status === 'entregado').reverse();

        if (completed.length === 0) {
          historyList.innerHTML = `
            <div class="history-empty">
              Aún no has completado ningún viaje. Los viajes entregados aparecerán aquí automáticamente.
            </div>`;
          return;
        }

        const cards = completed.slice(0, 10).map(order => {
          try {
            const duration = (typeof tripDuration === 'function')
              ? tripDuration(order.acceptedAt, order.deliveredAt)
              : null;
            const desc = (order.description || '').substring(0, 50);
            const suffix = (order.description || '').length > 50 ? '...' : '';
            const addr = (order.deliveryAddress || 'Sin dirección').split(',')[0];
            const price = order.estimatedPriceMin || 0;
            return `
              <div class="history-item">
                <div class="history-main" style="flex: 1;">
                  <div class="history-info">${desc}${suffix}</div>
                  <div class="history-meta">
                    <span>📅 ${timeAgo(order.createdAt)}</span>
                    <span>•</span>
                    <span>📍 ${addr}</span>
                    ${duration ? `<span>•</span><span>⏱️ ${duration}</span>` : ''}
                  </div>
                </div>
                <div class="history-actions" style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                  <div class="history-price" style="margin-bottom: 2px;">$${price}</div>
                  <div style="display: flex; gap: 6px;">
                    <button class="btn btn-sm btn-outline" style="padding: 4px 8px; font-size: 0.8rem; border-color: #6b7280; color: #9ca3af;" onclick="editManualTrip('${order.id}')" title="Editar">✏️</button>
                    <button class="btn btn-sm btn-outline" style="padding: 4px 8px; font-size: 0.8rem; border-color: #ef4444; color: #ef4444;" onclick="deleteTrip('${order.id}')" title="Borrar">🗑️</button>
                  </div>
                </div>
              </div>`;
          } catch (e) {
            return '';
          }
        });

        historyList.innerHTML = cards.join('');
      } catch (err) {
        historyList.innerHTML = `<div class="history-empty">Error cargando historial.</div>`;
        console.error('renderHistory error:', err);
      }
    }

    function createEmptyState() {
      const div = document.createElement('div');
      div.className = 'empty-state';
      div.innerHTML = `
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-title">Sin mandados por ahora</div>
        <div class="empty-state-text">Cuando un cliente solicite un mandado, aparecerá aquí automáticamente.</div>
      `;
      return div;
    }

    async function acceptOrder(orderId) {
      const order = await store.acceptOrder(orderId, user);
      if (order) {
        showToast('¡Mandado aceptado! Revisa los detalles.', 'success');
        setTimeout(() => navigateTo(`entrega.html?id=${order.id}`), 600);
      } else {
        showToast('Este mandado ya fue tomado.', 'error');
        loadOrders();
      }
    }

    async function goToActiveDelivery() {
      const active = await store.getActiveOrderForDriver(user.id);
      if (active) navigateTo(`entrega.html?id=${active.id}`);
    }

    function handleLogout() {
      store.logout();
      navigateTo('./');
    }

    // --- MANUAL TRIP LOGIC --- //
    function openManualTripModal() {
      document.getElementById('manual-trip-title').textContent = 'Agregar Viaje Manual';
      document.getElementById('manual-trip-form').reset();
      document.getElementById('mt-id').value = '';
      document.getElementById('manual-trip-modal').classList.remove('hidden');
    }

    function closeManualTripModal() {
      document.getElementById('manual-trip-modal').classList.add('hidden');
    }

    async function saveManualTrip(e) {
      e.preventDefault();
      const id = document.getElementById('mt-id').value;
      const desc = document.getElementById('mt-desc').value.trim();
      const addr = document.getElementById('mt-addr').value.trim();
      const price = Number(document.getElementById('mt-price').value);
      const dur = Number(document.getElementById('mt-duration').value);

      const submitBtn = e.target.querySelector('[type="submit"]');
      submitBtn.disabled = true;

      const deliveredAt = new Date();
      let acceptedAt = new Date(deliveredAt.getTime() - (dur || 10) * 60000);

      if (id) {
         const updates = {
           description: desc,
           deliveryAddress: addr,
           estimatedPriceMin: price,
           estimatedPriceMax: price,
         };
         if (dur) {
            updates.acceptedAt = acceptedAt.toISOString();
            updates.deliveredAt = deliveredAt.toISOString();
         }
         await store.updateOrder(id, updates);
         showToast('Viaje modificado con éxito.', 'success');
      } else {
         await store.createCompletedOrder({
           description: desc,
           deliveryAddress: addr,
           pickupAddress: 'Agregado manualmente',
           estimatedPriceMin: price,
           estimatedPriceMax: price,
           driverId: user.id,
           driverName: user.name,
           acceptedAt: acceptedAt.toISOString(),
           deliveredAt: deliveredAt.toISOString()
         });
         showToast('Viaje manual agregado.', 'success');
      }

      closeManualTripModal();
      submitBtn.disabled = false;
      renderHistory();
    }

    async function editManualTrip(id) {
      showToast('Cargando viaje...', 'info');
      const allMyOrders = await store.getOrdersByDriver(user.id);
      const trip = allMyOrders.find(o => o.id === id);
      if (!trip) return;

      document.getElementById('manual-trip-title').textContent = 'Modificar Viaje';
      document.getElementById('mt-id').value = trip.id;
      document.getElementById('mt-desc').value = trip.description || '';
      document.getElementById('mt-addr').value = trip.deliveryAddress || '';
      document.getElementById('mt-price').value = trip.estimatedPriceMin || 0;
      
      const durMs = new Date(trip.deliveredAt || new Date()).getTime() - new Date(trip.acceptedAt || new Date()).getTime();
      const durMins = durMs > 0 ? Math.round(durMs / 60000) : '';
      document.getElementById('mt-duration').value = durMins;

      document.getElementById('manual-trip-modal').classList.remove('hidden');
    }

    async function deleteTrip(id) {
      if (confirm('¿Estás seguro de que deseas eliminar este viaje del historial? Esto no se puede deshacer.')) {
        showToast('Eliminando...', 'warning');
        const success = await store.deleteOrder(id);
        if (success) {
           showToast('Viaje eliminado.', 'success');
           renderHistory();
        } else {
           showToast('Error al eliminar.', 'error');
        }
      }
    }
  </script>
</body>
</html>

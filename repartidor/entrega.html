<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MotoClick — Vista de entrega activa con mapa y actualización de estado.">
  <title>MotoClick — Entrega Activa</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    .delivery-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-lg);
    }
    @media (min-width: 900px) {
      .delivery-layout {
        grid-template-columns: 1fr 400px;
      }
    }
    .delivery-map { min-height: 420px; }
    .delivery-sidebar { display: flex; flex-direction: column; gap: var(--space-lg); }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: var(--space-md);
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border-color);
    }
    .info-row:last-child { border-bottom: none; }
    .info-row-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 2px; }
    .info-row-content { flex: 1; }
    .info-row-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .info-row-value { margin-top: 2px; font-size: 0.95rem; }

    .status-btn-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .status-btn-group .btn {
      padding: 18px;
      font-size: 1.05rem;
    }

    .completed-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 15, 26, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: var(--z-modal);
      animation: fadeIn var(--duration-normal) var(--ease-out);
    }
    .completed-check {
      font-size: 5rem;
      margin-bottom: var(--space-lg);
      animation: float 2s ease-in-out infinite;
    }
    .completed-title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: var(--space-sm);
    }
    .completed-text {
      color: var(--text-secondary);
      margin-bottom: var(--space-xl);
    }

    .client-contact {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md);
      background: rgba(59, 130, 246, 0.06);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: var(--radius-md);
    }
    .client-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--info-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }
    .user-greeting { cursor: pointer; }
    .section-title-md { margin-bottom: var(--space-md); font-size: 1rem; }
    .section-title-sm { margin-bottom: var(--space-sm); font-size: 1rem; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- Navbar -->
    <nav class="navbar">
      <a href="../" class="navbar-brand">
        <img src="../assets/logo.png" alt="MotoClick Logo" class="brand-logo">
      </a>
      <div class="navbar-actions">
        <span class="user-greeting" id="user-greeting" onclick="openProfileModal()" title="Editar Perfil"></span>
        <a href="panel.html" class="btn btn-sm btn-secondary">← Panel</a>
      </div>
    </nav>

    <div class="page-content">
      <div class="container">
        <h2 class="mb-lg animate-fade-in">🏍️ Entrega Activa</h2>

        <!-- Status -->
        <div class="status-tracker mb-lg animate-fade-in-up stagger-1" id="status-tracker"></div>

        <!-- Layout -->
        <div class="delivery-layout animate-fade-in-up stagger-2">
          <!-- Map -->
          <div class="map-container delivery-map">
            <div id="map"></div>
          </div>

          <!-- Sidebar -->
          <div class="delivery-sidebar">
            <!-- Client -->
            <div class="card-glass">
              <h3 class="section-title-md">👤 Cliente</h3>
              <div class="client-contact" id="client-info"></div>
            </div>

            <!-- Details -->
            <div class="card-glass">
              <h3 class="section-title-sm">📋 Detalles</h3>
              <div id="delivery-details"></div>
            </div>

            <!-- Actions -->
            <div class="card-glass">
              <h3 class="section-title-md">⚡ Actualizar Estado</h3>
              <div class="status-btn-group" id="status-actions"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Completed Overlay -->
    <div class="completed-overlay hidden" id="completed-overlay">
      <div class="completed-check">🎉</div>
      <div class="completed-title text-gradient">¡Entrega Completada!</div>
      <div class="completed-text">Has entregado el mandado con éxito.</div>
      <button class="btn btn-primary btn-lg" onclick="navigateTo('panel.html')">
        Volver al Panel
      </button>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBnfCrURPf28s3I5mAzhl3Jbol4U5p2igE"></script>
  <script src="../js/store.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    const user = requireAuth('driver');
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id');

    if (user) {
      const g = document.getElementById('user-greeting');
      if (g) g.innerHTML = `Hola, <span class="user-name" id="navbar-user-name">${user.name}</span>`;
    }

    if (!orderId) {
      showToast('Pedido no encontrado.', 'error');
      setTimeout(() => navigateTo('panel.html'), 1000);
    }

    let map, pickupMarker, deliveryMarker, driverMarker, routeLine;
    let movementTimer = null;

    function init() {
      if (typeof google === 'undefined') {
        showToast('Error cargando Google Maps API.', 'error');
        return;
      }
      loadOrder();
    }

    function loadOrder() {
      const order = store.getOrderById(orderId);
      if (!order) {
        showToast('Pedido no encontrado.', 'error');
        return;
      }

      renderStatus(order.status);
      renderDetails(order);
      renderMap(order);
      renderActions(order);

      if (order.status === 'entregado') {
        document.getElementById('completed-overlay').classList.remove('hidden');
      }
    }

    function renderStatus(status) {
      const tracker = document.getElementById('status-tracker');
      const steps = STATUS_ORDER;
      const currentIdx = getStatusIndex(status);

      tracker.innerHTML = steps.map((s, i) => {
        const labels = { pending: 'Pendiente', accepted: 'Aceptado', en_camino: 'En camino', recolectado: 'Recolectado', entregado: 'Entregado' };
        const icons = { pending: '⏳', accepted: '✅', en_camino: '🏍️', recolectado: '📦', entregado: '🎉' };
        let cls = '';
        if (i < currentIdx) cls = 'completed';
        else if (i === currentIdx) cls = 'active';

        let html = `
          <div class="status-step ${cls}">
            <div class="status-dot">${icons[s]}</div>
            <span class="status-label">${labels[s]}</span>
          </div>`;
        if (i < steps.length - 1) {
          html += `<div class="status-line ${i < currentIdx ? 'completed' : ''}"></div>`;
        }
        return html;
      }).join('');
    }

    function renderDetails(order) {
      document.getElementById('client-info').innerHTML = `
        <div class="client-avatar">👤</div>
        <div style="flex: 1;">
          <div style="font-weight: 600;">${order.clientName}</div>
          <div style="font-size: 0.85rem; color: var(--text-muted);">📞 ${order.clientPhone}</div>
        </div>
      `;

      document.getElementById('delivery-details').innerHTML = `
        <div class="info-row">
          <span class="info-row-icon">📝</span>
          <div class="info-row-content">
            <div class="info-row-label">Mandado</div>
            <div class="info-row-value">${order.description}</div>
          </div>
        </div>
        <div class="info-row">
          <span class="info-row-icon">📍</span>
          <div class="info-row-content">
            <div class="info-row-label">Recolección</div>
            <div class="info-row-value">${order.pickupAddress}</div>
          </div>
        </div>
        <div class="info-row">
          <span class="info-row-icon">🏠</span>
          <div class="info-row-content">
            <div class="info-row-label">Entrega</div>
            <div class="info-row-value">${order.deliveryAddress}</div>
          </div>
        </div>
        <div class="info-row">
          <span class="info-row-icon">${order.paymentMethod === 'cash' ? '💵' : order.paymentMethod === 'card' ? '💳' : '🏦'}</span>
          <div class="info-row-content">
            <div class="info-row-label">Método de pago</div>
            <div class="info-row-value">${getPaymentLabel(order.paymentMethod)}</div>
          </div>
        </div>
        <div class="info-row" style="background: rgba(34, 197, 94, 0.05); border-radius: 8px; border: 1px dashed rgba(34, 197, 94, 0.2);">
          <span class="info-row-icon">💰</span>
          <div class="info-row-content">
            <div class="info-row-label">Total Mandado</div>
            <div class="info-row-value"><strong style="color: #22c55e; font-size: 1.1rem;">$${order.estimatedPriceMin || 0} - $${order.estimatedPriceMax || 0}</strong></div>
            ${order.stops && order.stops.length > 0 ? `<div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">Incluye ${order.stops.length} parada(s) extra (+$${order.stops.length * 15})</div>` : ''}
          </div>
        </div>
      `;
    }

    function renderMap(order) {
      if (!order.pickupCoords || !order.deliveryCoords) return;

      if (!map) {
        map = new google.maps.Map(document.getElementById('map'), {
          zoom: 14,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: false,
          styles: [
            // Dark mode
            { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
            { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
            { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
            { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
            { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
            { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
            { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] },
            { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#515c6d" }] },
            { featureType: "water", elementType: "labels.text.stroke", stylers: [{ color: "#17263c" }] }
          ]
        });

        const pickupLatLng = { lat: order.pickupCoords[0], lng: order.pickupCoords[1] };
        const deliveryLatLng = { lat: order.deliveryCoords[0], lng: order.deliveryCoords[1] };

        pickupMarker = new google.maps.Marker({
          position: pickupLatLng,
          map: map,
          title: 'Recolección: ' + order.pickupAddress,
          label: '📍'
        });
        
        deliveryMarker = new google.maps.Marker({
          position: deliveryLatLng,
          map: map,
          title: 'Entrega: ' + order.deliveryAddress,
          label: '🏠'
        });

        routeLine = new google.maps.Polyline({
          path: [pickupLatLng, deliveryLatLng],
          geodesic: true,
          strokeColor: '#00E65B',
          strokeOpacity: 0.8,
          strokeWeight: 4,
          map: map
        });

        // Start driver near pickup
        const driverStart = {
          lat: order.pickupCoords[0] + (Math.random() - 0.5) * 0.008,
          lng: order.pickupCoords[1] + (Math.random() - 0.5) * 0.008
        };
        
        driverMarker = new google.maps.Marker({
          position: driverStart,
          map: map,
          label: '🏍️',
          zIndex: 999
        });

        const bounds = new google.maps.LatLngBounds();
        bounds.extend(pickupLatLng);
        bounds.extend(deliveryLatLng);
        bounds.extend(driverStart);
        map.fitBounds(bounds);
      }
    }

    function renderActions(order) {
      const container = document.getElementById('status-actions');
      const s = order.status;

      if (s === 'entregado') {
        container.innerHTML = `
          <button class="btn btn-success btn-block" disabled>
            🎉 Entrega completada
          </button>
        `;
        return;
      }

      const nextSteps = {
        accepted: { label: '🏍️ En Camino', status: 'en_camino', cls: 'btn-primary' },
        en_camino: { label: '📦 Recolectado', status: 'recolectado', cls: 'btn-primary' },
        recolectado: { label: '🎉 Entregado', status: 'entregado', cls: 'btn-success' }
      };

      const next = nextSteps[s];
      let html = '';
      if (next) {
        html += `
          <button class="btn ${next.cls} btn-block" onclick="changeStatus('${next.status}')">
            ${next.label}
          </button>
        `;
      }

      // Add "Hacer Parada" button if not delivered
      if (s !== 'entregado') {
        html += `
          <button class="btn btn-outline btn-block mt-sm" onclick="hacerParada()" style="border-color: #3b82f6; color: #3b82f6;">
            📍 Hacer Parada extra (+$15)
          </button>
        `;
      }
      container.innerHTML = html;
    }

    function changeStatus(newStatus) {
      const order = store.updateOrderStatus(orderId, newStatus);
      if (!order) return;

      showToast(`Estado actualizado: ${getStatusLabel(newStatus)}`, 'success');

      if (newStatus === 'en_camino') {
        startMovement(order.pickupCoords, order.deliveryCoords);
      }

      loadOrder();

      if (newStatus === 'entregado') {
        if (movementTimer) clearInterval(movementTimer);
        setTimeout(() => {
          document.getElementById('completed-overlay').classList.remove('hidden');
        }, 500);
      }
    }

    function hacerParada() {
      const order = store.getOrderById(orderId);
      if (!order) return;

      const desc = prompt("Describe la parada (ej. OXXO por cigarros):");
      if (!desc) return;

      const stops = order.stops || [];
      stops.push({ desc, time: new Date().toISOString() });

      const updates = {
        stops,
        description: order.description + `\n[PARADA: ${desc}]`,
        estimatedPriceMin: (order.estimatedPriceMin || 0) + 15,
        estimatedPriceMax: (order.estimatedPriceMax || 0) + 15
      };

      store.updateOrder(orderId, updates);
      showToast('Parada agregada. Total actualizado.', 'success');
      loadOrder();
    }

    function startMovement(from, to) {
      if (movementTimer) clearInterval(movementTimer);
      const route = generateRoute(from, to, 25);

      movementTimer = simulateMovement(route, (point, idx, total) => {
        const latLng = { lat: point[0], lng: point[1] };
        if (driverMarker) {
          driverMarker.setPosition(latLng);
        }
        // Broadcast location to client (store expects [lat, lng])
        store.updateDriverLocation(orderId, point);
      }, 2000);
    }

    // Listen for real-time updates from other tabs (like if price changes)
    store.on('order_updated', (updatedOrder) => {
      if (updatedOrder.id === orderId) {
        loadOrder();
      }
    });

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MotoClick — Inicia sesión o regístrate como cliente para enviar mandados.">
  <title>MotoClick — Cliente</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .tab-bar {
      display: flex;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-tertiary);
      margin-bottom: var(--space-xl);
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-secondary);
      background: transparent;
      border: none;
      transition: all var(--duration-fast) ease;
    }
    .tab-btn.active {
      background: var(--gradient-primary);
      color: #fff;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn var(--duration-normal) var(--ease-out); }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999;
      display: flex; align-items: center; justify-content: center; 
      -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-content {
      background: var(--bg-secondary); border-radius: var(--radius-md);
      padding: var(--space-xl); width: 90%; max-width: 400px;
    }
    .form-group-pin { margin-bottom: 8px; }
    .forgot-pin-wrapper { text-align: right; margin-bottom: 24px; }
    .forgot-pin-link { font-size: 0.85rem; color: var(--text-muted); text-decoration: underline; }
    .modal-h3 { margin-bottom: var(--space-xs); color: var(--text-primary); }
    .modal-p { font-size: 0.9rem; }
    .modal-actions { display: flex; gap: var(--space-md); margin-top: var(--space-lg); }
    .btn-whatsapp { background: #25D366; border-color: #25D366; color: white; }
    .auth-logo { height: 60px; width: auto; margin-bottom: var(--space-lg); filter: drop-shadow(0 0 10px rgba(0,230,91,0.15)); }
    body { opacity: 0; visibility: hidden; transition: opacity 0.3s ease; }
  </style>
  <script>document.addEventListener("DOMContentLoaded", () => { setTimeout(() => { document.body.style.visibility='visible'; document.body.style.opacity='1'; }, 100); });</script>
</head>
<body>
  <div class="page-wrapper">
    <!-- Navbar -->
    <nav class="navbar">
      <a href="../" class="navbar-brand">
        <img src="../assets/logo_motoclick_blanco.png" alt="MotoClick Logo" class="brand-logo">
      </a>
      <div class="navbar-actions">
        <span class="badge badge-active">Cliente</span>
      </div>
    </nav>

    <!-- Auth Form -->
    <div class="auth-wrapper">
      <div class="auth-card card-glass animate-fade-in">
        <div class="back-nav">
          <a href="../" class="btn-back">
            <i class="fas fa-arrow-left"></i> Regresar al inicio
          </a>
        </div>
        <div class="auth-header text-center">
          <img src="../assets/logo_motoclick_blanco.png" alt="MotoClick" class="auth-logo">
          <h2>Bienvenido a MotoClick</h2>
          <p class="text-secondary mt-sm">Envía y recibe mandados de forma rápida</p>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
          <button class="tab-btn active" id="tab-login-btn" onclick="switchTab('login')">Iniciar Sesión</button>
          <button class="tab-btn" id="tab-register-btn" onclick="switchTab('register')">Registrarme</button>
        </div>

        <!-- Login -->
        <div class="tab-content active" id="tab-login">
          <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label" for="login-phone">Teléfono</label>
              <input class="form-input" type="tel" id="login-phone" name="phone" placeholder="Ej. 5512345678" maxlength="10">
              <span class="form-error"></span>
            </div>
            <div class="form-group form-group-pin">
              <label class="form-label" for="login-pin">NIP de Seguridad (4 dígitos)</label>
              <input class="form-input" type="password" inputmode="numeric" pattern="[0-9]*" id="login-pin" name="pin" placeholder="Ingresa tu NIP" maxlength="4" required>
            </div>
            <div class="forgot-pin-wrapper">
              <a href="#" onclick="document.getElementById('forgot-pin-modal').classList.remove('hidden'); return false;" class="forgot-pin-link">¿Olvidaste tu contraseña?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-submit">
              Iniciar Sesión
            </button>
          </form>
        </div>

        <!-- Register -->
        <div class="tab-content" id="tab-register">
          <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
              <label class="form-label" for="reg-name">Nombre completo</label>
              <input class="form-input" type="text" id="reg-name" name="name" placeholder="Tu nombre">
              <span class="form-error"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-phone">Teléfono</label>
              <input class="form-input" type="tel" id="reg-phone" name="phone" placeholder="Ej. 5512345678" maxlength="10">
              <span class="form-error"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-pin">CREAR NIP DE SEGURIDAD (4 dígitos)</label>
              <input class="form-input" type="password" inputmode="numeric" pattern="[0-9]*" id="reg-pin" name="pin" placeholder="Ej. 1234" maxlength="4" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-lg" id="register-submit">
              Crear Cuenta
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Forgot PIN Modal -->
  <div class="modal-overlay hidden" id="forgot-pin-modal">
    <div class="modal-content animate-fade-in-up">
      <h3 class="modal-h3">Recuperar Contraseña</h3>
      <p class="text-secondary mb-md modal-p">Enviaremos tu solicitud por WhatsApp al administrador para cambiar tu NIP.</p>
      <form onsubmit="sendPinRecoverWhatsApp(event)">
        <div class="form-group">
          <label class="form-label" for="recover-phone">Tu Número Registrado</label>
          <input class="form-input" type="tel" id="recover-phone" required placeholder="Ej. 5512345678" maxlength="10" />
        </div>
        <div class="form-group">
          <label class="form-label" for="recover-new-pin">Nueva Contraseña Deseada</label>
          <input class="form-input" type="number" id="recover-new-pin" required placeholder="Ej. 1234" min="1000" max="9999" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary btn-block" onclick="document.getElementById('forgot-pin-modal').classList.add('hidden')">Cancelar</button>
          <button type="submit" class="btn btn-primary btn-block btn-whatsapp">Pedir Cambio</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    (function() {
      const user = store.getCurrentUser();
      if (user && user.role === 'client') window.location.href = 'nuevo-pedido.html';
    })();

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('tab-' + tab + '-btn').classList.add('active');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const form = e.target;
      if (!validateForm(form, { phone: { required: true, phone: true } })) return;
      
      const pin = form.pin ? form.pin.value.trim() : null;

      const btn = document.getElementById('login-submit');
      btn.disabled = true; btn.textContent = 'Verificando...';
      const result = await store.loginUser(form.phone.value.trim(), 'client', pin);
      btn.disabled = false; btn.textContent = 'Iniciar Sesión';
      if (result.success) {
        showToast('¡Bienvenido de vuelta! 🎉', 'success');
        setTimeout(() => navigateTo('nuevo-pedido.html'), 600);
      } else {
        showToast(result.error, 'error');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const form = e.target;
      if (!validateForm(form, { name: { required: true, minLength: 2 }, phone: { required: true, phone: true } })) return;
      
      const pin = form.pin ? form.pin.value.trim() : null;
      if (pin && pin.length !== 4) {
          showToast('El NIP debe tener exactamente 4 dígitos', 'error');
          return;
      }

      const btn = document.getElementById('register-submit');
      btn.disabled = true; btn.textContent = 'Creando cuenta...';
      const result = await store.registerUser({
        name: form.name.value.trim(),
        phone: form.phone.value.trim(),
        role: 'client',
        pin: pin
      });
      btn.disabled = false; btn.textContent = 'Crear Cuenta';
      if (result.success) {
        showToast('¡Cuenta creada con éxito! 🚀', 'success');
        setTimeout(() => navigateTo('nuevo-pedido.html'), 600);
      } else {
        showToast(result.error, 'error');
      }
    }

    function sendPinRecoverWhatsApp(e) {
      e.preventDefault();
      const phone = document.getElementById('recover-phone').value.trim();
      const newPin = document.getElementById('recover-new-pin').value.trim();
      if (!phone || !newPin) return;
      
      const adminPhone = "2331072438"; // MotoClick General Contact
      const text = `Hola, olvidé la contraseña de mi cuenta de cliente en MotoClick.%0A%0A*📱 Mi celular registrado:* ${phone}%0A*🔐 Nueva contraseña deseada:* ${newPin}%0A%0A¿Podrían actualizarla por favor?`;
      const url = `https://wa.me/${adminPhone}?text=${text}`;
      
      window.open(url, '_blank');
      document.getElementById('forgot-pin-modal').classList.add('hidden');
    }
  </script>
</body>
</html>

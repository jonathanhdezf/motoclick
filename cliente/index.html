<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MotoClick — Inicia sesión o regístrate como cliente para enviar mandados.">
  <title>MotoClick — Cliente</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    .tab-bar {
      display: flex;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-tertiary);
      margin-bottom: var(--space-xl);
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-secondary);
      background: transparent;
      border: none;
      transition: all var(--duration-fast) ease;
    }
    .tab-btn.active {
      background: var(--gradient-primary);
      color: #fff;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn var(--duration-normal) var(--ease-out); }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- Navbar -->
    <nav class="navbar">
      <a href="../" class="navbar-brand">
        <img src="../assets/logo.png" alt="MotoClick Logo" class="brand-logo">
      </a>
      <div class="navbar-actions">
        <span class="badge badge-active">Cliente</span>
      </div>
    </nav>

    <!-- Auth Form -->
    <div class="auth-wrapper">
      <div class="auth-card card-glass animate-fade-in">
        <div class="back-nav">
          <a href="../" class="btn-back">
            <i class="fas fa-arrow-left"></i> Regresar al inicio
          </a>
        </div>
        <div class="auth-header">
          <span class="auth-icon">📦</span>
          <h2>Bienvenido a MotoClick</h2>
          <p class="text-secondary mt-sm">Envía y recibe mandados de forma rápida</p>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
          <button class="tab-btn active" id="tab-login-btn" onclick="switchTab('login')">Iniciar Sesión</button>
          <button class="tab-btn" id="tab-register-btn" onclick="switchTab('register')">Registrarme</button>
        </div>

        <!-- Login -->
        <div class="tab-content active" id="tab-login">
          <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label" for="login-phone">Teléfono</label>
              <input class="form-input" type="tel" id="login-phone" name="phone" placeholder="Ej. 5512345678" maxlength="10">
              <span class="form-error"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-lg" id="login-submit">
              Iniciar Sesión
            </button>
          </form>
        </div>

        <!-- Register -->
        <div class="tab-content" id="tab-register">
          <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
              <label class="form-label" for="reg-name">Nombre completo</label>
              <input class="form-input" type="text" id="reg-name" name="name" placeholder="Tu nombre">
              <span class="form-error"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-phone">Teléfono</label>
              <input class="form-input" type="tel" id="reg-phone" name="phone" placeholder="Ej. 5512345678" maxlength="10">
              <span class="form-error"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-lg" id="register-submit">
              Crear Cuenta
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/store.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    // Check if already logged in
    (function() {
      const user = store.getCurrentUser();
      if (user && user.role === 'client') {
        window.location.href = 'nuevo-pedido.html';
      }
    })();

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('tab-' + tab + '-btn').classList.add('active');
    }

    function handleLogin(e) {
      e.preventDefault();
      const form = e.target;
      const valid = validateForm(form, {
        phone: { required: true, phone: true }
      });
      if (!valid) return;

      const phone = form.phone.value.trim();
      const result = store.loginUser(phone, 'client');
      if (result.success) {
        showToast('¡Bienvenido de vuelta! 🎉', 'success');
        setTimeout(() => navigateTo('nuevo-pedido.html'), 600);
      } else {
        showToast(result.error, 'error');
      }
    }

    function handleRegister(e) {
      e.preventDefault();
      const form = e.target;
      const valid = validateForm(form, {
        name: { required: true, minLength: 2 },
        phone: { required: true, phone: true }
      });
      if (!valid) return;

      const result = store.registerUser({
        name: form.name.value.trim(),
        phone: form.phone.value.trim(),
        role: 'client'
      });

      if (result.success) {
        showToast('¡Cuenta creada con éxito! 🚀', 'success');
        setTimeout(() => navigateTo('nuevo-pedido.html'), 600);
      } else {
        showToast(result.error, 'error');
      }
    }
  </script>
</body>
</html>

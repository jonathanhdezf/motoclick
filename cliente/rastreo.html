<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MotoClick — Rastrea tu mandado en tiempo real.">
  <title>MotoClick — Rastreo en Vivo</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .tracking-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-lg);
    }
    .tracking-map { min-height: 420px; position: relative; }
    #map { width: 100%; height: 100%; min-height: 420px; }
    .tracking-details { display: flex; flex-direction: column; gap: var(--space-lg); }
    .tracking-section-title { margin-bottom: var(--space-md); font-size: 1rem; }
    .user-greeting { cursor: pointer; }
    .waiting-text { color: var(--text-secondary); font-size: 0.9rem; }
    .order-summary {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
    .order-summary-row {
      display: flex;
      align-items: flex-start;
      gap: var(--space-md);
    }
    .order-summary-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .order-summary-content {
      flex: 1;
    }
    .order-summary-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .order-summary-value {
      font-size: 0.95rem;
      color: var(--text-primary);
      margin-top: 2px;
    }
    .driver-card {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md);
      background: rgba(0, 230, 91, 0.06);
      border: 1px solid var(--border-active);
      border-radius: var(--radius-md);
    }
    .driver-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .driver-info { flex: 1; }
    .driver-name { font-weight: 600; font-size: 1rem; display: flex; align-items: center; }
    .driver-label { font-size: 0.8rem; color: var(--text-muted); }
    .verified-badge { color: #22c55e; margin-left: 6px; font-size: 1.1rem; }

    .waiting-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 15, 26, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: var(--radius-lg);
      gap: var(--space-md);
    }
    .waiting-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary-500);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .map-stamp {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 10px 30px;
      border: 6px solid;
      border-radius: 12px;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
      box-shadow: inset 0 0 0 3px currentColor, 0 8px 30px rgba(0,0,0,0.4);
      background: rgba(10, 15, 26, 0.7);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }
    .map-stamp.active {
      opacity: 0.9;
      transform: translate(-50%, -50%) rotate(-10deg) scale(1.1);
    }
    .map-stamp.entregado { color: #22c55e; border-color: #22c55e; box-shadow: 0 10px 40px rgba(34, 197, 94, 0.2); }
    .map-stamp.cancelado { color: #ef4444; border-color: #ef4444; box-shadow: 0 10px 40px rgba(239, 68, 68, 0.2); }

    @media (min-width: 900px) {
      .tracking-layout {
        grid-template-columns: 1fr 380px;
      }
    }

    /* Ticket Modal Styles */
    #ticket-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      z-index: 10000; display: none; align-items: center;
      justify-content: center; padding: 20px;
      -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    }
    #ticket-modal-overlay.active { display: flex; }
    .ticket-paper {
      background: #fff; color: #111; width: 100%; max-width: 360px;
      padding: 28px 24px; position: relative;
      font-family: 'Courier New', Courier, monospace;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      max-height: 90vh; overflow-y: auto;
      border-radius: 4px;
    }
    .ticket-paper::after {
      content: ''; position: absolute; left: 0; bottom: -10px;
      width: 100%; height: 10px;
      background:
        linear-gradient(-45deg, transparent 5px, #fff 0),
        linear-gradient( 45deg, transparent 5px, #fff 0);
      background-size: 10px 10px;
    }
    .tkt-head { text-align: center; border-bottom: 2px dashed #ccc; padding-bottom: 14px; margin-bottom: 14px; }
    .tkt-logo { height: 44px; display: block; margin: 0 auto 8px; filter: grayscale(1); }
    .tkt-brand { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; }
    .tkt-sub { font-size: 0.7rem; color: #666; margin-top: 3px; }
    .tkt-meta { font-size: 0.65rem; color: #888; margin-top: 4px; }
    .tkt-items { border-bottom: 2px dashed #ccc; padding-bottom: 12px; margin-bottom: 12px; }
    .tkt-row { display: flex; justify-content: space-between; font-size: 0.88rem; margin-bottom: 5px; }
    .tkt-total { font-size: 1.15rem; font-weight: 900; text-align: right; }
    .tkt-footer { text-align: center; font-size: 0.7rem; color: #888; margin-top: 16px; line-height: 1.6; }
    .tkt-actions { display: flex; gap: 8px; margin-top: 18px; }
    .tkt-actions .btn { flex: 1; padding: 11px; font-size: 0.85rem; border-radius: 8px; font-weight: 700; }
    @media print {
      body * { visibility: hidden; }
      .ticket-paper, .ticket-paper * { visibility: visible; }
      .ticket-paper { position: absolute; left: 0; top: 0; box-shadow: none; width: 100%; max-width: none; }
      .tkt-actions { display: none !important; }
    }
    .btn-success { background: #22c55e !important; color: #fff !important; font-weight: 800; border: none; cursor: pointer; }
    
    /* Navbar Utilities */
    .nav-user-controls { display: flex; align-items: center; gap: 15px; }
    .btn-new-order-lite { 
      background: rgba(34, 197, 94, 0.1); 
      border: 1px solid var(--accent); 
      color: var(--accent); 
      padding: 5px 12px; 
      font-size: 11px; 
      font-weight: 800; 
      text-transform: uppercase; 
    }
    .nav-greeting { font-weight: 700; font-size: 14px; }
  </style>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
  <div class="page-wrapper">
    <!-- Navbar -->
    <nav class="navbar">
      <a href="../" class="navbar-brand">
        <img src="../assets/logo.png" alt="MotoClick Logo" class="brand-logo">
      </a>
      <div class="navbar-actions">
        <div class="user-control-group nav-user-controls">
           <a href="nuevo-pedido.html" class="btn btn-sm btn-secondary btn-new-order-lite">+ Nuevo Mandado</a>
           <span class="user-greeting nav-greeting" id="user-greeting" onclick="openProfileModal()" title="Editar Perfil"></span>
        </div>
      </div>
    </nav>

    <div class="page-content">
      <div class="container">
        <h2 class="mb-lg animate-fade-in">📍 Rastreo en Vivo</h2>

        <!-- Status Tracker -->
        <div class="status-tracker mb-lg animate-fade-in-up stagger-1" id="status-tracker"></div>

        <!-- Layout -->
        <div class="tracking-layout animate-fade-in-up stagger-2">
          <!-- Map -->
          <div class="map-container tracking-map">
            <div id="map"></div>
            <div id="map-stamp" class="map-stamp hidden"></div>
            <div class="waiting-overlay hidden" id="waiting-overlay">
              <div class="waiting-spinner"></div>
              <p class="waiting-text">Buscando repartidor disponible...</p>
            </div>
          </div>

          <!-- Details -->
          <div class="tracking-details">
            <!-- Driver Info -->
            <div class="card-glass hidden" id="driver-section">
              <h3 class="tracking-section-title">🏍️ Tu Repartidor</h3>
              <div class="driver-card" id="driver-card"></div>
            </div>

            <!-- Order Summary -->
            <div class="card-glass">
              <h3 class="tracking-section-title">📋 Detalles del mandado</h3>
              <div class="order-summary" id="order-summary"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id');

    if (!orderId) {
      showToast('Pedido no encontrado.', 'error');
      setTimeout(() => navigateTo('nuevo-pedido.html'), 1000);
    }

    let map, pickupMarker, deliveryMarker, driverMarker, routeLine;
    let directionsService, directionsRenderer;

    function initMap() {
      console.log("Google Maps API ready.");
      if (typeof google !== 'undefined') loadOrder();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await requireAuth('client');
      if (user) {
        const g = document.getElementById('user-greeting');
        if (g) g.innerHTML = `Hola, <span id="navbar-user-name" style="color: var(--accent);">${user.name}</span> <i class="fas fa-chevron-down" style="font-size: 10px; opacity: 0.5; margin-left: 5px;"></i>`;
      }

      loadOrder();
      // Listen for real-time updates
      store.on('order_accepted', handleUpdate);
      store.on('status_change', handleUpdate);
      store.on('order_updated', handleUpdate);
      store.on('location_update', handleLocationUpdate);
      // Poll as fallback
      setInterval(loadOrder, 3000);
    });

    function handleUpdate(data) {
      if (data.id === orderId || data.orderId === orderId) {
        loadOrder();
      }
    }

    function handleLocationUpdate(data) {
      if (data.orderId === orderId && data.location) {
        updateDriverMarker(data.location);
      }
    }

    async function loadOrder() {
      const order = await store.getOrderById(orderId);
      if (!order) {
        console.warn('[Tracking] No se pudo cargar el pedido:', orderId);
        return;
      }

      renderStatus(order.status);
      renderSummary(order);
      renderMap(order);

      const mapStamp = document.getElementById('map-stamp');
      if (order.status === 'entregado') {
        mapStamp.innerHTML = 'ENTREGADO';
        mapStamp.className = 'map-stamp entregado active';
      } else if (order.status === 'cancelado') {
        mapStamp.innerHTML = 'CANCELADO';
        mapStamp.className = 'map-stamp cancelado active';
      } else {
        mapStamp.className = 'map-stamp hidden';
      }

      if (order.status === 'pending') {
        document.getElementById('waiting-overlay').classList.remove('hidden');
        document.getElementById('driver-section').classList.add('hidden');
      } else {
        document.getElementById('waiting-overlay').classList.add('hidden');
        if (order.driverName) {
          document.getElementById('driver-section').classList.remove('hidden');
          const verifiedIcon = order.driverIsVerified
             ? `<i class="fas fa-check-circle verified-badge" title="Repartidor Verificado ✅"></i>`
             : '';

          document.getElementById('driver-card').innerHTML = `
            <div class="driver-avatar" style="overflow: hidden; background: #eee;">
              ${order.driverPhoto ? `<img src="${order.driverPhoto}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src=''; this.parentElement.innerHTML='🏍️'">` : '🏍️'}
            </div>
            <div class="driver-info">
              <div class="driver-name">${order.driverName} ${verifiedIcon}</div>
              <div class="driver-label">Repartidor asignado</div>
            </div>
            <span class="badge badge-active">${getStatusLabel(order.status)}</span>
          `;
        }
      }
    }

    function renderStatus(status) {
      const tracker = document.getElementById('status-tracker');
      const steps = STATUS_ORDER;
      const currentIdx = getStatusIndex(status);

      tracker.innerHTML = steps.map((s, i) => {
        const labels = { pending: 'Pendiente', accepted: 'Aceptado', armando_pedido: 'Comprando', en_camino: 'En camino', recolectado: 'Recolectado', entregado: 'Entregado' };
        const icons = { pending: '⏳', accepted: '✅', armando_pedido: '🛒', en_camino: '🏍️', recolectado: '📦', entregado: '🎉' };
        let cls = '';
        if (i < currentIdx) cls = 'completed';
        else if (i === currentIdx) cls = 'active';

        let html = `
          <div class="status-step ${cls}">
            <div class="status-dot">${icons[s]}</div>
            <span class="status-label">${labels[s]}</span>
          </div>`;
        if (i < steps.length - 1) {
          html += `<div class="status-line ${i < currentIdx ? 'completed' : ''}"></div>`;
        }
        return html;
      }).join('');
    }

    function renderSummary(order) {
      document.getElementById('order-summary').innerHTML = `
        <div class="order-summary-row">
          <span class="order-summary-icon">📝</span>
          <div class="order-summary-content">
            <div class="order-summary-label">Mandado</div>
            <div class="order-summary-value">${order.description}</div>
          </div>
        </div>
        <div class="order-summary-row">
          <span class="order-summary-icon">📍</span>
          <div class="order-summary-content">
            <div class="order-summary-label">Recolección</div>
            <div class="order-summary-value">${order.pickupAddress}</div>
          </div>
        </div>
        <div class="order-summary-row">
          <span class="order-summary-icon">🏠</span>
          <div class="order-summary-content">
            <div class="order-summary-label">Entrega</div>
            <div class="order-summary-value">${order.deliveryAddress}</div>
          </div>
        </div>
        <div class="order-summary-row">
          <span class="order-summary-icon">${order.paymentMethod === 'cash' ? '💵' : order.paymentMethod === 'card' ? '💳' : '🏦'}</span>
          <div class="order-summary-content">
            <div class="order-summary-label">Pago</div>
            <div class="order-summary-value">${getPaymentLabel(order.paymentMethod)}</div>
          </div>
        </div>
        ${(order.stops && order.stops.length > 0) || order.stopDescription ? `
          <div class="order-summary-row" style="background: rgba(59, 130, 246, 0.05); padding: 12px; border-radius: 12px; border-left: 3px solid #3b82f6; margin-top: 10px;">
            <span class="order-summary-icon">📍</span>
            <div class="order-summary-content">
              <div class="order-summary-label">Paradas Extra</div>
              <div class="order-summary-value" style="font-weight: 500; color: #3b82f6; display: flex; flex-direction: column; gap: 4px; margin-top: 4px;">
                ${order.stops ? order.stops.map(s => {
                  const desc = typeof s === 'string' ? s : s.desc;
                  return `<div>• ${desc}</div>`;
                }).join('') : `<div>• ${order.stopDescription}</div>`}
              </div>
            </div>
          </div>
        ` : ''}
        <div class="order-summary-row" style="background: rgba(34, 197, 94, 0.05); padding: 16px; border-radius: 12px; border: 2px solid rgba(34, 197, 94, 0.2); margin: 15px 0;">
          <span class="order-summary-icon">💳</span>
          <div class="order-summary-content" style="width: 100%;">
            <div style="display: flex; flex-direction: column; gap: 8px;">
              <!-- Desglose de Gastos -->
              <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: #555;">
                <span>Servicio de Mandado:</span>
                <span style="font-weight: 600;">$${Number(order.estimatedPriceMin) || 0} - $${Number(order.estimatedPriceMax) || 0}</span>
              </div>
              
              ${order.subtotal_compra > 0 ? `
                <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: #555; padding-top: 4px; border-top: 1px dashed rgba(0,0,0,0.1);">
                  <span>Ticket de Compra:</span>
                <div style="text-align: right;">
                    <span style="font-weight: 600; color: #22c55e;">$${(Number(order.subtotal_compra) || 0).toFixed(2)}</span>
                    <button class="btn btn-sm btn-outline" style="margin-top: 2px; display: block; width: 100%; border-radius: 6px; padding: 2px 8px; font-size: 0.65rem;" onclick="openTicketModal()">🧾 Ver Detalle</button>
                  </div>
                </div>
              ` : ''}

              <!-- TOTAL FINAL -->
              <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 6px; padding-top: 10px; border-top: 2px solid rgba(34, 197, 94, 0.2);">
                <span style="font-weight: 900; color: #166534; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Total a Pagar</span>
                <div style="text-align: right;">
                   <strong style="color: #15803d; font-size: 1.35rem; display: block; line-height: 1.1;">
                     $${((Number(order.estimatedPriceMin) || 0) + (Number(order.subtotal_compra) || 0)).toFixed(0)} - $${((Number(order.estimatedPriceMax) || 0) + (Number(order.subtotal_compra) || 0)).toFixed(0)}
                   </strong>
                   <span style="font-size: 0.6rem; color: #666; font-weight: 500;">*Sujeto a cambios por extras</span>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="order-summary-row">
          <span class="order-summary-icon">🕐</span>
          <div class="order-summary-content">
            <div class="order-summary-label">Solicitado</div>
            <div class="order-summary-value">${formatDate(order.createdAt)}</div>
          </div>
        </div>
      `;
    }

    const GOOGLE_DEFAULT_CENTER = { lat: 19.8166, lng: -97.3596 }; // Teziutlán

    function renderMap(order) {
      if (typeof google === 'undefined') return;
      // Always initialize the map, even without coords
      if (!map) {
        const center = (order.pickupCoords)
          ? { lat: order.pickupCoords[0], lng: order.pickupCoords[1] }
          : GOOGLE_DEFAULT_CENTER;

        map = new google.maps.Map(document.getElementById('map'), {
          center: center,
          zoom: order.pickupCoords ? 14 : 13,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: false,
          styles: [
            { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
            { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
            { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
            { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
            { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
            { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
            { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] },
            { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#515c6d" }] },
            { featureType: "water", elementType: "labels.text.stroke", stylers: [{ color: "#17263c" }] }
          ]
        });

        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
          map: map,
          suppressMarkers: true, // Use our custom markers instead
          polylineOptions: {
            strokeColor: '#00E65B',
            strokeOpacity: 0.8,
            strokeWeight: 5
          }
        });
      }

      // Only draw markers and route when both coordinates are real
      if (order.pickupCoords && order.deliveryCoords && !pickupMarker) {
        const pickupLatLng = { lat: Number(order.pickupCoords[0]), lng: Number(order.pickupCoords[1]) };
        const deliveryLatLng = { lat: Number(order.deliveryCoords[0]), lng: Number(order.deliveryCoords[1]) };

        pickupMarker = new google.maps.Marker({
          position: pickupLatLng,
          map: map,
          title: 'Recolección: ' + order.pickupAddress,
          label: '📍'
        });

        deliveryMarker = new google.maps.Marker({
          position: deliveryLatLng,
          map: map,
          title: 'Entrega: ' + order.deliveryAddress,
          label: '🏠'
        });

        // Request REAL route from Google
        directionsService.route({
          origin: pickupLatLng,
          destination: deliveryLatLng,
          travelMode: google.maps.TravelMode.DRIVING
        }, (response, status) => {
          if (status === 'OK') {
            directionsRenderer.setDirections(response);
          } else {
            console.error('Directions request failed due to ' + status);
            // Fallback to straight polyline if directions fail
            routeLine = new google.maps.Polyline({
              path: [pickupLatLng, deliveryLatLng],
              geodesic: true,
              strokeColor: '#00E65B',
              strokeOpacity: 0.8,
              strokeWeight: 4,
              map: map
            });
          }
        });
      }

      if (order.driverLocation) {
        updateDriverMarker(order.driverLocation);
      }
    }

    function updateDriverMarker(location) {
      const latLng = { lat: location[0], lng: location[1] };
      if (!driverMarker) {
        driverMarker = new google.maps.Marker({
          position: latLng,
          map: map,
          label: '🏍️',
          zIndex: 999
        });
      } else {
        driverMarker.setPosition(latLng);
      }
    }

    async function openTicketModal() {
      const [items, orderData] = await Promise.all([
        window.store.getTicketDetails(orderId),
        window.store.getOrderById(orderId)
      ]);
      
      let itemsHtml = '';
      let total = 0;
      
      items.forEach(it => {
        const sub = (Number(it.precio_unitario) || 0) * (Number(it.cantidad) || 1);
        total += sub;
        itemsHtml += `<div class="tkt-row"><span>${it.cantidad}x ${it.descripcion}</span><span>$${sub.toFixed(2)}</span></div>`;
      });
      
      document.getElementById('ticket-content').innerHTML = `
        <div class="tkt-head">
          <img src="../assets/logo.png" class="tkt-logo" onerror="this.style.display='none'">
          <div class="tkt-brand">MOTOCLICK</div>
          <div class="tkt-sub">Ticket de Mandado</div>
          <div class="tkt-meta">ID: ${orderId.slice(0, 16).toUpperCase()}</div>
          <div class="tkt-meta">Fecha: ${new Date().toLocaleDateString('es-MX')}</div>
        </div>
        <div class="tkt-items">
          ${itemsHtml || '<div style="text-align:center;padding:10px;color:#999;">Sin productos registrados</div>'}
        </div>
        <div class="tkt-total">TOTAL: $${total.toFixed(2)}</div>
        <div class="tkt-footer">
          Gracias por tu confianza<br>
          Repartidor: ${orderData ? orderData.driverName || 'Asignado' : ''}<br>
          MotoClick &mdash; Mandados Rápidos
        </div>
      `;
      
      document.getElementById('ticket-modal-overlay').classList.add('active');
    }

    function closeTicketModal() {
      document.getElementById('ticket-modal-overlay').classList.remove('active');
    }

    function printTicket() {
      window.print();
    }

    async function downloadTicket() {
      const paper = document.querySelector('.ticket-paper');
      const actions = document.querySelector('.tkt-actions');
      actions.style.display = 'none';
      
      try {
        const canvas = await html2canvas(paper, {
          backgroundColor: '#ffffff',
          scale: 2
        });
        const link = document.createElement('a');
        link.download = `ticket-${orderId.slice(0, 8)}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch(e) {
        console.error(e);
        showToast('Error al generar imagen', 'error');
      } finally {
        actions.style.display = 'flex';
      }
    }

    // init() is called by the Google Maps callback
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBnfCrURPf28s3I5mAzhl3Jbol4U5p2igE&callback=initMap"></script>
  <!-- Ticket Modal -->
  <div id="ticket-modal-overlay">
    <div class="ticket-paper">
      <div id="ticket-content"></div>
      <div class="tkt-actions">
        <button class="btn btn-outline" onclick="closeTicketModal()">Cerrar</button>
        <button class="btn btn-primary" onclick="printTicket()"><i class="fas fa-print"></i></button>
        <button class="btn btn-success" onclick="downloadTicket()"><i class="fas fa-download"></i></button>
      </div>
    </div>
  </div>
</body>
</html>

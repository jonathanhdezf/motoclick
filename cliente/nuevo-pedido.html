<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MotoClick — Solicita un nuevo mandado y elige tu forma de pago.">
  <title>MotoClick — Nuevo Pedido</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    .order-form-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }
    .order-form-header h1 {
      font-size: 1.8rem;
    }
    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-accent);
      margin-bottom: var(--space-md);
      margin-top: var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .form-card { max-width: 650px; margin: 0 auto; }
    .user-greeting {
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
    }
    .user-name {
      color: var(--text-accent);
      font-weight: 600;
    }
    .form-group-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      align-items: baseline;
    }
    .m-b-0 { margin-bottom: 0; }
    .map-picker-link {
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .payment-subtext {
      font-size: 0.75rem;
    }
    .map-modal-overlay {
      align-items: flex-start;
      padding-top: 10vh;
    }
    .map-modal-content {
      max-width: 600px;
    }
    .map-modal-body {
      padding: 0;
    }
    .picker-map-container {
      width: 100%;
      height: 380px;
      background: #0a0f1a;
      border-radius: var(--radius-md);
    }
    .map-modal-footer {
      padding: var(--space-md);
    }
    .map-picker-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: var(--space-md);
    }

    .orders-history {
      max-width: 650px;
      margin: var(--space-2xl) auto 0;
    }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-sm);
      transition: all var(--duration-fast) ease;
      cursor: pointer;
    }
    .history-item:hover {
      border-color: var(--border-active);
    }
    .history-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .history-desc {
      font-weight: 500;
      font-size: 0.95rem;
    }
    .history-date {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- Navbar -->
    <nav class="navbar">
      <a href="../" class="navbar-brand">
        <span class="brand-icon">🏍️</span>
        <span>MotoClick</span>
      </a>
      <div class="navbar-actions">
        <span class="user-greeting" id="user-greeting" onclick="openProfileModal()" title="Editar Perfil"></span>
        <button class="btn btn-sm btn-secondary" onclick="handleLogout()" id="btn-logout">Salir</button>
      </div>
    </nav>

    <!-- Form -->
    <div class="page-content">
      <div class="container">
        <div class="form-card card-glass animate-fade-in">
          <div class="order-form-header">
            <h1>📋 Nuevo Mandado</h1>
            <p class="text-secondary">Cuéntanos qué necesitas y nosotros lo llevamos</p>
          </div>

          <form id="order-form" onsubmit="handleSubmitOrder(event)">
            <!-- Mandado -->
            <div class="section-title">📝 ¿Qué necesitas?</div>
            <div class="form-group">
              <label class="form-label" for="description">Descripción del mandado</label>
              <textarea class="form-textarea" id="description" name="description"
                placeholder="Ej. Recoger un paquete en la tienda X y entregarlo en mi casa. El paquete es una caja pequeña de color azul."></textarea>
              <span class="form-error"></span>
            </div>

            <!-- Addresses -->
            <div class="section-title">📍 Direcciones</div>
            <div class="form-group">
              <div class="form-group-header">
                <label class="form-label m-b-0" for="pickup-address">Dirección de recolección</label>
                <span class="text-accent map-picker-link" onclick="openMapPicker('pickup')">📍 Marcar en mapa</span>
              </div>
              <input class="form-input" type="text" id="pickup-address" name="pickupAddress"
                placeholder="Ej. Av. Reforma 222, Col. Juárez, CDMX">
              <span class="form-error"></span>
            </div>
            <div class="form-group">
              <div class="form-group-header">
                <label class="form-label m-b-0" for="delivery-address">Dirección de entrega</label>
                <span class="text-accent map-picker-link" onclick="openMapPicker('delivery')">📍 Marcar en mapa</span>
              </div>
              <input class="form-input" type="text" id="delivery-address" name="deliveryAddress"
                placeholder="Ej. Calle Monterrey 54, Col. Roma Norte, CDMX">
              <span class="form-error"></span>
            </div>

            <!-- Payment -->
            <div class="section-title">💰 Forma de pago</div>
            <div class="payment-options">
              <label class="payment-card">
                <input type="radio" name="paymentMethod" value="cash" checked>
                <div class="payment-card-body">
                  <span class="payment-icon">💵</span>
                  <span class="payment-label">Efectivo</span>
                  <span class="text-muted payment-subtext">Paga al recibir</span>
                </div>
              </label>
              <label class="payment-card">
                <input type="radio" name="paymentMethod" value="card">
                <div class="payment-card-body">
                  <span class="payment-icon">💳</span>
                  <span class="payment-label">Tarjeta</span>
                  <span class="text-muted payment-subtext">Crédito o débito</span>
                </div>
              </label>
              <label class="payment-card">
                <input type="radio" name="paymentMethod" value="transfer">
                <div class="payment-card-body">
                  <span class="payment-icon">🏦</span>
                  <span class="payment-label">Transferencia</span>
                  <span class="text-muted payment-subtext">SPEI / bancaria</span>
                </div>
              </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg mt-xl" id="submit-order">
              🏍️ Solicitar Mandado
            </button>
          </form>
        </div>

        <!-- Recent Orders -->
        <div class="orders-history" id="orders-history"></div>
      </div>
    </div>

    <!-- Map Picker Modal -->
    <div class="modal-overlay hidden map-modal-overlay" id="map-picker-modal">
      <div class="modal-content card-glass map-modal-content">
        <div class="modal-header">
          <h3>📍 Seleccionar Ubicación</h3>
          <button class="modal-close" type="button" onclick="closeMapPicker()">&times;</button>
        </div>
        <div class="modal-body mt-md map-modal-body">
          <div id="picker-map" class="picker-map-container"></div>
          <div class="map-modal-footer">
             <p id="picker-address-text" class="map-picker-text">Mueve el mapa o haz clic para seleccionar la ubicación exacta.</p>
             <button type="button" class="btn btn-primary btn-block" id="btn-confirm-location" onclick="confirmLocation()">✔ Confirmar Ubicación</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBnfCrURPf28s3I5mAzhl3Jbol4U5p2igE&libraries=places"></script>
  <script src="../js/store.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    const user = requireAuth('client');
    if (user) {
      document.getElementById('user-greeting').innerHTML =
        `Hola, <span class="user-name" id="navbar-user-name">${user.name}</span>`;
      renderHistory();
    }

    function handleSubmitOrder(e) {
      e.preventDefault();
      const form = e.target;

      const valid = validateForm(form, {
        description: { required: true, minLength: 5, requiredMessage: 'Describe tu mandado.' },
        pickupAddress: { required: true, minLength: 5, requiredMessage: 'Ingresa la dirección de recolección.' },
        deliveryAddress: { required: true, minLength: 5, requiredMessage: 'Ingresa la dirección de entrega.' }
      });

      if (!valid) return;

      const order = store.createOrder({
        clientId: user.id,
        clientName: user.name,
        clientPhone: user.phone,
        description: form.description.value.trim(),
        pickupAddress: form.pickupAddress.value.trim(),
        deliveryAddress: form.deliveryAddress.value.trim(),
        paymentMethod: form.paymentMethod.value,
        pickupCoords: currentCoords.pickup || [
          19.4326 + (Math.random() - 0.5) * 0.03,
          -99.1332 + (Math.random() - 0.5) * 0.03
        ],
        deliveryCoords: currentCoords.delivery || [
          19.4326 + (Math.random() - 0.5) * 0.03,
          -99.1332 + (Math.random() - 0.5) * 0.03
        ]
      });

      showToast('¡Mandado solicitado! Buscando repartidor...', 'success');
      setTimeout(() => navigateTo(`rastreo.html?id=${order.id}`), 800);
    }

    function renderHistory() {
      const container = document.getElementById('orders-history');
      const orders = store.getOrdersByClient(user.id).reverse();
      if (orders.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = `
        <h3 style="margin-bottom: var(--space-md); color: var(--text-secondary);">📜 Tus mandados recientes</h3>
        ${orders.slice(0, 5).map(o => `
          <div class="history-item" onclick="navigateTo('rastreo.html?id=${o.id}')">
            <div class="history-left">
              <span class="history-desc">${o.description.substring(0, 60)}${o.description.length > 60 ? '...' : ''}</span>
              <span class="history-date">${timeAgo(o.createdAt)}</span>
            </div>
            <span class="badge ${o.status === 'entregado' ? 'badge-success' : o.status === 'pending' ? 'badge-pending' : 'badge-active'}">
              ${getStatusLabel(o.status)}
            </span>
          </div>
        `).join('')}
      `;
    }

    function handleLogout() {
      store.logout();
      navigateTo('./');
    }

    // --- Map Picker Logic (Google Maps) ---
    let pickerType = null;
    let pickerMap = null;
    let pickerMarker = null;
    let geocoder = null;
    
    // Default center (CDMX)
    const GMAP_DEFAULT_CENTER = { lat: 19.4326, lng: -99.1332 };
    
    let currentCoords = { pickup: null, delivery: null };
    let tempCoords = null;
    let tempAddress = '';

    function openMapPicker(type) {
      pickerType = type;
      const modalEl = document.getElementById('map-picker-modal');
      modalEl.classList.remove('hidden');
      modalEl.style.display = 'flex';
      
      const initialPos = currentCoords[type] 
        ? { lat: currentCoords[type][0], lng: currentCoords[type][1] } 
        : GMAP_DEFAULT_CENTER;

      // Initialize map only once
      if (!pickerMap) {
        if (typeof google === 'undefined') {
          showToast('Error cargando Google Maps. Revisa tu conexión o API Key.', 'error');
          return;
        }
        
        geocoder = new google.maps.Geocoder();
        
        pickerMap = new google.maps.Map(document.getElementById('picker-map'), {
          center: initialPos,
          zoom: 15,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: false,
          styles: [
            // Dark mode simple styles
            { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
            { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
            { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
            { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
            { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
            { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
            { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] },
            { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#515c6d" }] },
            { featureType: "water", elementType: "labels.text.stroke", stylers: [{ color: "#17263c" }] }
          ]
        });
        
        pickerMarker = new google.maps.Marker({
          position: initialPos,
          map: pickerMap,
          draggable: true,
          animation: google.maps.Animation.DROP,
        });
        
        // Listeners for Google Maps
        pickerMap.addListener('click', (e) => {
          pickerMarker.setPosition(e.latLng);
          updatePickerAddress(e.latLng);
        });
        
        pickerMarker.addListener('dragend', () => {
          updatePickerAddress(pickerMarker.getPosition());
        });
      } else {
        // Map exists, just update it
        pickerMap.setCenter(initialPos);
        pickerMarker.setPosition(initialPos);
      }
      
      // Fix rendering issues in hidden modals
      setTimeout(() => {
        google.maps.event.trigger(pickerMap, 'resize');
        pickerMap.setCenter(initialPos);
      }, 150);
      
      updatePickerAddress(initialPos);
    }
    
    function closeMapPicker() {
      const modalEl = document.getElementById('map-picker-modal');
      modalEl.classList.add('hidden');
      modalEl.style.display = '';
    }
    
    function updatePickerAddress(latLngObj) {
      tempCoords = [latLngObj.lat(), latLngObj.lng()];
      const textEl = document.getElementById('picker-address-text');
      const btn = document.getElementById('btn-confirm-location');
      
      textEl.textContent = 'Obteniendo dirección exacta...';
      btn.disabled = true;
      
      if (!geocoder) {
        tempAddress = 'Ubicación seleccionada en el mapa';
        textEl.textContent = tempAddress;
        btn.disabled = false;
        return;
      }
      
      geocoder.geocode({ location: latLngObj }, (results, status) => {
        if (status === "OK" && results[0]) {
          tempAddress = results[0].formatted_address;
          textEl.textContent = tempAddress;
        } else {
          tempAddress = 'Ubicación seleccionada en el mapa';
          textEl.textContent = tempAddress;
        }
        btn.disabled = false;
      });
    }
    
    function confirmLocation() {
      if (pickerType === 'pickup') {
        currentCoords.pickup = tempCoords;
        const el = document.getElementById('pickup-address');
        el.value = tempAddress;
        const group = el.closest('.form-group');
        if (group) group.classList.remove('has-error');
      } else {
        currentCoords.delivery = tempCoords;
        const el = document.getElementById('delivery-address');
        el.value = tempAddress;
        const group = el.closest('.form-group');
        if (group) group.classList.remove('has-error');
      }
      closeMapPicker();
    }
  </script>
</body>
</html>
